# ============================================
# StayNest - Application Configuration
# ============================================

# ---- Server ----
server.port=8080

# ---- Database Connection ----
# Use an embedded H2 database by default so the app can run locally without MySQL.
spring.datasource.url=jdbc:h2:mem:staynestdb;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ---- JPA / Hibernate ----
# update = create tables if missing, never drop existing data. Safe for dev.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- Thymeleaf ----
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ---- File Upload (property images, profile pictures) ----
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# ---- Logging ----
logging.level.com.staynest=DEBUG
logging.level.org.springframework.security=INFO

# ---- App Info ----
spring.application.name=StayNest
app.name=StayNest
