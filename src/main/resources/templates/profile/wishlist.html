<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('My wishlist')}"></head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-5">
    <h2 class="mb-4">My wishlist</h2>

    <div th:if="${wishlists.isEmpty()}" class="text-center py-5">
        <p class="text-muted">No saved stays yet — tap the heart on a listing to save it here.</p>
        <a th:href="@{/}" class="btn-sn-primary">Explore stays</a>
    </div>

    <div class="row g-4">
        <div th:replace="~{fragments/property-card :: card(${w.property})}" th:each="w : ${wishlists}"></div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
