<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${title} != null ? ${title} : 'Error')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<div class="container py-5 text-center" style="max-width:480px;">
    <i class="bi bi-exclamation-triangle" style="font-size:3rem; color:var(--color-gold);"></i>
    <h2 class="mt-3" th:text="${title != null} ? ${title} : 'Something went wrong'">Error</h2>
    <p class="text-muted" th:text="${message}">An unexpected error occurred.</p>
    <a th:href="@{/}" class="btn-sn-primary">Back to home</a>
</div>
</body>
</html>
