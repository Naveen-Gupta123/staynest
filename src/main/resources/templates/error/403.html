<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Access denied')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<div class="container py-5 text-center" style="max-width:480px;">
    <i class="bi bi-shield-lock" style="font-size:3rem; color:var(--color-danger);"></i>
    <h2 class="mt-3">Access denied</h2>
    <p class="text-muted" th:text="${message != null} ? ${message} : 'You do not have permission to view this page.'">Message</p>
    <a th:href="@{/}" class="btn-sn-primary">Back to home</a>
</div>
</body>
</html>
