<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${propertyId != null} ? 'Edit listing' : 'New listing')}"></head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-5" style="max-width:720px;">
    <h2 class="mb-4" th:text="${propertyId != null} ? 'Edit your listing' : 'Create a new listing'">New listing</h2>

    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="sn-form-card">
        <form th:action="${propertyId != null} ? @{/host/properties/update/{id}(id=${propertyId})} : @{/host/properties/create}"
              th:object="${propertyRequest}" method="post" enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text" th:field="*{title}" class="form-control" placeholder="Cozy 2BHK near the beach"
                       th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea th:field="*{description}" rows="4" class="form-control" placeholder="Describe your space..."
                          th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"></textarea>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-4">
                    <label class="form-label">Property type</label>
                    <select th:field="*{type}" class="form-select">
                        <option value="APARTMENT">Apartment</option>
                        <option value="VILLA">Villa</option>
                        <option value="HOUSE">House</option>
                        <option value="CABIN">Cabin</option>
                        <option value="HOTEL_ROOM">Hotel Room</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Price / night (₹)</label>
                    <input type="number" step="0.01" th:field="*{pricePerNight}" class="form-control"
                           th:classappend="${#fields.hasErrors('pricePerNight')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('pricePerNight')}" th:errors="*{pricePerNight}"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Max guests</label>
                    <input type="number" min="1" th:field="*{maxGuests}" class="form-control"
                           th:classappend="${#fields.hasErrors('maxGuests')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('maxGuests')}" th:errors="*{maxGuests}"></div>
                </div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label">Bedrooms</label>
                    <input type="number" min="1" th:field="*{bedrooms}" class="form-control"
                           th:classappend="${#fields.hasErrors('bedrooms')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('bedrooms')}" th:errors="*{bedrooms}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Bathrooms</label>
                    <input type="number" min="1" th:field="*{bathrooms}" class="form-control"
                           th:classappend="${#fields.hasErrors('bathrooms')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('bathrooms')}" th:errors="*{bathrooms}"></div>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Address</label>
                <input type="text" th:field="*{address}" class="form-control" placeholder="Street address"
                       th:classappend="${#fields.hasErrors('address')} ? 'is-invalid'">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-4">
                    <label class="form-label">City</label>
                    <input type="text" th:field="*{city}" class="form-control"
                           th:classappend="${#fields.hasErrors('city')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('city')}" th:errors="*{city}"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">State</label>
                    <input type="text" th:field="*{state}" class="form-control"
                           th:classappend="${#fields.hasErrors('state')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('state')}" th:errors="*{state}"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Country</label>
                    <input type="text" th:field="*{country}" class="form-control"
                           th:classappend="${#fields.hasErrors('country')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('country')}" th:errors="*{country}"></div>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Amenities (comma-separated)</label>
                <input type="text" th:field="*{amenities}" class="form-control" placeholder="WiFi, Pool, Free parking, Kitchen">
            </div>

            <div class="mb-4">
                <label class="form-label">Photos</label>
                <input type="file" name="images" class="form-control" multiple accept="image/*">

                <div class="row g-2 mt-2" th:if="${existingImages != null and !existingImages.isEmpty()}">
                    <div class="col-3" th:each="img : ${existingImages}">
                        <img th:src="@{${img.imageUrl}}" class="w-100 rounded" style="height:70px; object-fit:cover;" alt="Existing photo">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-sn-primary w-100" th:text="${propertyId != null} ? 'Save changes' : 'Publish listing'">Publish</button>
        </form>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
