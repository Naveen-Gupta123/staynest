<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Manage bookings')}"></head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-5">
    <h2 class="mb-4">Booking requests</h2>

    <div th:if="${bookings.isEmpty()}" class="text-center py-5">
        <p class="text-muted">No booking requests yet.</p>
    </div>

    <div class="sn-form-card mb-3" th:each="b : ${bookings}">
        <div class="row align-items-center">
            <div class="col-md-3">
                <h6 class="mb-1" th:text="${b.property.title}">Property</h6>
                <p class="text-muted small mb-0" th:text="'Guest: ' + ${b.guest.fullName}">Guest</p>
            </div>
            <div class="col-md-3">
                <p class="mb-0 small text-muted">Dates</p>
                <p class="mb-0" th:text="${b.checkIn} + ' → ' + ${b.checkOut}">Dates</p>
            </div>
            <div class="col-md-2">
                <p class="mb-0 small text-muted">Total</p>
                <p class="mb-0 fw-bold">₹<span th:text="${b.totalPrice}">0</span></p>
            </div>
            <div class="col-md-2">
                <span class="badge-status" th:classappend="'badge-' + ${#strings.toLowerCase(b.status)}" th:text="${b.status}">STATUS</span>
            </div>
            <div class="col-md-2 d-flex gap-2" th:if="${b.status.name() == 'PENDING'}">
                <form th:action="@{/host/bookings/confirm/{id}(id=${b.id})}" method="post">
                    <button type="submit" class="btn-sn-sage btn-sm">Accept</button>
                </form>
                <form th:action="@{/host/bookings/reject/{id}(id=${b.id})}" method="post">
                    <button type="submit" class="btn-sn-danger btn-sm">Decline</button>
                </form>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
