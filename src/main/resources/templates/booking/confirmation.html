<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Booking requested')}"></head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-5 text-center" style="max-width:560px;">
    <i class="bi bi-check-circle-fill" style="font-size:3rem; color:var(--color-success);"></i>
    <h2 class="mt-3">Booking requested!</h2>
    <p class="text-muted">Your trip to <strong th:text="${booking.property.title}">Property</strong> is pending host confirmation.</p>

    <div class="sn-form-card text-start mt-4">
        <div class="d-flex justify-content-between mb-2">
            <span class="text-muted">Check-in</span>
            <strong th:text="${booking.checkIn}">Date</strong>
        </div>
        <div class="d-flex justify-content-between mb-2">
            <span class="text-muted">Check-out</span>
            <strong th:text="${booking.checkOut}">Date</strong>
        </div>
        <div class="d-flex justify-content-between mb-2">
            <span class="text-muted">Guests</span>
            <strong th:text="${booking.guests}">2</strong>
        </div>
        <div class="d-flex justify-content-between mb-2">
            <span class="text-muted">Status</span>
            <span class="badge-status badge-pending" th:text="${booking.status}">PENDING</span>
        </div>
        <hr>
        <div class="d-flex justify-content-between">
            <span class="fw-bold">Total</span>
            <span class="fw-bold">₹<span th:text="${booking.totalPrice}">0</span></span>
        </div>
    </div>

    <a th:href="@{/booking/my-bookings}" class="btn-sn-primary mt-4">View my trips</a>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
